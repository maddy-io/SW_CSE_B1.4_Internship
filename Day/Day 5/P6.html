<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB,RGBA colors</title>
    <style>
        p{
            /* 0 - 255 */
            color: rgb(255, 67, 45);
        }
        h1{
            /* Transparency: 0 (transparent) to 1 (opaque) */
            color: rgb(255, 67, 45, 0.5);
        }
    </style>
</head>
<body>
    <p>Paragraph</p>
    <h1>Heading 1</h1>
   
</body>
</html>
