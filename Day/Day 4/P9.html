<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selector</title>
    <style>
        h1,h3{
            margin:0;
            padding:0;
            color:royalblue;
        }
        h2,h4{
            margin:0;
            padding:0;
            color:aqua;
            background-color :blueviolet;   
        }
    </style>
</head>
<body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
</body>
</html>
